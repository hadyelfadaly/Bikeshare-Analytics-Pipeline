version: 2

models:
  - name: dim_stations
    description: "This model contains information about each bike station"
    columns:
      - name: station_id
        description: "Unique identifier for each station."
        tests:
          - not_null
          - unique
      - name: station_name
        description: "Name of the station."
  - name: dim_location
    description: "This model contains information about the locations of the stations."
    columns:
      - name: location_id
        description: "Unique identifier for each location."
        tests:
          - not_null
          - unique
      - name: latitude
        description: "Latitude of the location."
        tests:
          - not_null
      - name: longitude
        description: "Longitude of the location."
        tests:
          - not_null
  - name: fct_trips
    description: "This model contains the fact table for trips, with foreign keys to the dimension tables."
    columns:
      - name: trip_id
        description: "Surrogate key for each cleaned trip record."
        tests:
          - not_null
          - unique
      - name: ride_id
        description: "Unique identifier for each trip."
        tests:
          - not_null
      - name: start_location_id
        description: "Foreign key to dim_location for the trip start coordinate."
        tests:
          - relationships:
              to: ref('dim_location')
              field: location_id
              where: "start_location_id IS NOT NULL"
      - name: end_location_id
        description: "Foreign key to dim_location for the trip end coordinate."
        tests:
          - relationships:
              to: ref('dim_location')
              field: location_id
              where: "end_location_id IS NOT NULL"
      - name: started_at
        description: "Timestamp when the trip started."
        tests:
          - not_null
      - name: ended_at
        description: "Timestamp when the trip ended."
        tests:
          - not_null
      - name: rideable_type
        description: "Type of bike used for the trip."
        tests:
          - accepted_values:
              values: ['classic_bike', 'electric_bike']
      - name: start_station_id
        description: "Foreign key to dim_stations for the station where the trip started."
        tests:
          - relationships:
              to: ref('dim_stations')
              field: station_id
              where: "start_station_id IS NOT NULL"
      - name: end_station_id
        description: "Foreign key to dim_stations for the station where the trip ended."
        tests:
          - relationships:
              to: ref('dim_stations')
              field: station_id
              where: "end_station_id IS NOT NULL"
      - name: trip_duration_minutes
        description: "Trip duration in minutes based on started_at and ended_at."
      - name: trip_distance_meters
        description: "Great-circle distance between start and end coordinates in meters."
      - name: pickup_type
        description: "Derived pickup behavior category (station, dockless, or unknown)."
        tests:
          - accepted_values:
              values: ['dockless_pickup', 'missing_station_unknown', 'station_pickup']
      - name: dropoff_type
        description: "Derived dropoff behavior category (station, dockless, or unknown)."
        tests:
          - accepted_values:
              values: ['dockless_dropoff', 'missing_station_unknown', 'station_dropoff']
      - name: member_casual
        description: "Rider category indicating whether the user is a member or casual rider."
        tests:
          - accepted_values:
              values: ['member', 'casual']
  - name: membership_behaviour_tile
    description: "Report model answering: How does riding behavior differ between members and casual riders? Aggregates trip metrics by membership type for dashboard consumption."
    columns:
      - name: member_casual
        description: "Rider category indicating whether the user is a member or casual rider."
      - name: average_trip_duration_minutes
        description: "Average trip duration in minutes for this membership category."
      - name: average_trip_distance_meters
        description: "Average trip distance in meters for this membership category."

  - name: operational_map_tile
    description: "Report model answering: Where are bikes being picked up and dropped off? Provides coordinates for map visualizations."
    columns:
      - name: latitude
        description: "Latitude of the station location."
      - name: longitude
        description: "Longitude of the station location."
      - name: pickup_type
        description: "Derived pickup behavior category (station, dockless, or unknown)."
      - name: trip_count
        description: "Count of trips for this pickup type per location."